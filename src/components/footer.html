<dialog id="contact-dialog" class="contact-dialog" aria-labelledby="contact-title" aria-modal="true">
  <div class="form-card">
    <button type="button" class="contact-dialog-close" id="contact-dialog-close" aria-label="Close dialog">&times;</button>

      <form id="contact-form" class="form" novalidate>

        <div class="form-group">
          <label for="contact-name">Name</label>
          <input type="text" id="contact-name" name="name" required placeholder="John Doe" autocomplete="name" />
        </div>

        <div class="form-group">
          <label for="contact-phone">Phone Number</label>
          <input
            type="tel"
            id="contact-phone"
            name="phone"
            required
            placeholder="(123) 456-7890"
            autocomplete="tel"
          />
        </div>

        <div class="form-group">
          <label for="contact-question">Question</label>
          <textarea
            id="contact-question"
            name="question"
            required
            placeholder="Do all your mentors have successful engineering careers?
Do you guys teach programming from zero?"
            rows="6"
          ></textarea>
        </div>

        <button id="contact-submit-btn" type="submit" class="submit-btn button">Send</button>

        <div id="contact-error-msg" class="error-msg hidden" aria-hidden="true"></div>
      </form>

    <div id="contact-success-msg" class="success-msg contact-success-msg hidden" aria-hidden="true">
      <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width: 48px; height: 48px;">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <h2>Thank you!</h2>
      <p>
        <span class="phrase">Your question has been sent.</span>
        <span class="phrase">We will get back to you soon.</span>
      </p>
      <button type="button" class="button contact-ok-btn" id="contact-ok-btn">OK</button>
    </div>
  </div>
</dialog>

<script type="module" src="/src/lib/contact-form.ts"></script>
