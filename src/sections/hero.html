<section class="hero" id="top">
  <div class="hero-image-container" id="hero-image-target">
    <picture>
      <img
        src="/mentor-hero-day.webp"
        alt="A software engineer mentoring a student"
        sizes="100vw"
        class="hero-image"
        fetchpriority="high"
        decoding="async"
        onload="this.classList.add('loaded')"
      />
    </picture>
  </div>
  <div class="hero-text-box">
    <h1>
      <span class="phrase">Welcome to</span>
      <span class="phrase">Real Learning</span>
    </h1>
    <p>
      <span class="phrase">Software engineering</span>
      <span class="phrase">for high school students</span>
      <br>
      by real software engineers.
    </p>
    <p>
      <a href="/#offers" class="hero-cta-btn button">Sign Up</a>
    </p>
  </div>
  <noscript> <!-- just show the image without animations if JS is disabled -->
    <style>
      .hero-image {
        opacity: 1 !important;
        filter: blur(0) !important;
      }
    </style>
  </noscript>
</section>
